<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0f172a">
<meta name="description" content="Herramienta informativa de apoyo a la consulta del protocolo de profilaxis antibiótica quirúrgica. No sustituye el juicio clínico.">
<meta name="robots" content="noindex">
<title>PROFILAXIS ANTIBIÓTICA QUIRÚRGICA</title>

<!-- PWA mínima: manifest embebido como data URI para single-file deploy -->
<link rel="manifest" href='data:application/manifest+json,{"name":"Profilaxis Quirúrgica","short_name":"Profilaxis","start_url":".","display":"standalone","background_color":"%23f8fafc","theme_color":"%230f172a","icons":[]}'>

<style>
/* ============================================================
   Reset + variables (sin dependencias externas)
   ============================================================ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  /* Paleta clínica neutra de alto contraste */
  --bg:        #f8fafc;
  --surface:   #ffffff;
  --surface-2: #f1f5f9;
  --border:    #e2e8f0;
  --border-strong: #cbd5e1;
  --text:      #0f172a;
  --text-2:    #334155;
  --text-3:    #64748b;
  --primary:   #1e3a8a;   /* azul profundo neutro */
  --primary-fg:#ffffff;
  --info-bg:   #eff6ff;
  --info-fg:   #1e40af;
  --warn-bg:   #fffbeb;
  --warn-fg:   #92400e;
  --warn-bd:   #fde68a;
  /* Rojo reservado EXCLUSIVAMENTE para contraindicaciones / alertas críticas */
  --alert-bg:  #fef2f2;
  --alert-fg:  #991b1b;
  --alert-bd:  #fecaca;
  --ok-bg:     #f0fdf4;
  --ok-fg:     #166534;

  --radius:    10px;
  --radius-sm: 6px;
  --shadow:    0 1px 2px rgba(15,23,42,.04), 0 1px 1px rgba(15,23,42,.03);
  --tap:       44px; /* mínimo táctil */
}

html, body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto,
               'Helvetica Neue', Arial, sans-serif;
  font-size: 16px;
  line-height: 1.45;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  text-size-adjust: 100%;
}

body {
  min-height: 100vh;
  min-height: 100dvh;
  padding-bottom: env(safe-area-inset-bottom);
}

button {
  font: inherit;
  color: inherit;
  background: none;
  border: none;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
button:focus-visible,
[role="button"]:focus-visible {
  outline: 2px solid var(--primary);
  outline-offset: 2px;
}

/* ============================================================
   Layout
   ============================================================ */
.app {
  max-width: 720px;
  margin: 0 auto;
  padding: 0 16px 96px;
}

header.app-header {
  position: sticky;
  top: 0;
  z-index: 10;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  margin: 0 -16px 12px;
  padding: 12px 16px calc(12px + env(safe-area-inset-top)) 16px;
  padding-top: calc(12px + env(safe-area-inset-top));
}
.app-header h1 {
  font-size: 15px;
  font-weight: 600;
  letter-spacing: .01em;
  color: var(--text);
  display: flex;
  align-items: center;
  gap: 8px;
}
.app-header .tag {
  font-size: 11px;
  font-weight: 500;
  color: var(--text-3);
  text-transform: uppercase;
  letter-spacing: .06em;
  margin-top: 2px;
  display: block;
}
.dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--primary);
  display: inline-block;
}

/* Disclaimer permanente (MDR: herramienta informativa) */
.disclaimer {
  background: var(--warn-bg);
  border: 1px solid var(--warn-bd);
  color: var(--warn-fg);
  border-radius: var(--radius);
  padding: 10px 12px;
  font-size: 13px;
  line-height: 1.4;
  margin-bottom: 16px;
  display: flex;
  gap: 8px;
}
.disclaimer strong { font-weight: 600; }
.disclaimer .icn {
  flex: 0 0 16px;
  width: 16px; height: 16px;
  margin-top: 2px;
}

/* ============================================================
   Vista: listado de cirugías
   ============================================================ */
.view-title {
  font-size: 13px;
  font-weight: 500;
  color: var(--text-3);
  text-transform: uppercase;
  letter-spacing: .05em;
  margin: 8px 4px 10px;
}

.search {
  display: block;
  width: 100%;
  min-height: var(--tap);
  padding: 10px 14px;
  margin-bottom: 12px;
  font-size: 15px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
}
.search:focus { outline: 2px solid var(--primary); outline-offset: -1px; border-color: transparent; }

.list {
  list-style: none;
  display: grid;
  grid-template-columns: 1fr;
  gap: 8px;
}
.surgery-btn {
  width: 100%;
  min-height: var(--tap);
  padding: 14px 16px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  text-align: left;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  font-size: 15px;
  font-weight: 500;
  color: var(--text);
  transition: border-color .12s ease, background .12s ease;
}
.surgery-btn:hover { border-color: var(--border-strong); }
.surgery-btn:active { background: var(--surface-2); }
.surgery-btn .arrow {
  flex: 0 0 auto;
  color: var(--text-3);
  font-size: 18px;
  line-height: 1;
}

/* ============================================================
   Vista: detalle / variantes
   ============================================================ */
.back {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  min-height: var(--tap);
  padding: 8px 12px 8px 4px;
  margin: 4px 0 8px -4px;
  font-size: 14px;
  color: var(--text-2);
  font-weight: 500;
}
.back .arrow { font-size: 18px; line-height: 1; }

.detail h2 {
  font-size: 20px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 4px;
  letter-spacing: -.01em;
}
.detail .sub {
  font-size: 13px;
  color: var(--text-3);
  margin-bottom: 16px;
}

.scenarios {
  list-style: none;
  display: grid;
  gap: 8px;
  margin-bottom: 16px;
}
.scenario-btn {
  width: 100%;
  min-height: var(--tap);
  padding: 14px 16px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  text-align: left;
  font-size: 15px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
}
.scenario-btn[aria-pressed="true"] {
  border-color: var(--primary);
  background: var(--info-bg);
  color: var(--info-fg);
}
.scenario-btn .label { font-weight: 500; }
.scenario-btn .pill {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .04em;
  padding: 3px 8px;
  border-radius: 999px;
  background: var(--surface-2);
  color: var(--text-3);
  flex: 0 0 auto;
}
.scenario-btn[aria-pressed="true"] .pill {
  background: var(--primary);
  color: var(--primary-fg);
}

/* ============================================================
   Resultado: información del protocolo
   ============================================================ */
.result {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 0;
  overflow: hidden;
  margin-bottom: 14px;
}
.result-section {
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
}
.result-section:last-child { border-bottom: none; }
.result-section h3 {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .07em;
  color: var(--text-3);
  margin-bottom: 8px;
}
.result-section .body {
  font-size: 15px;
  color: var(--text);
  line-height: 1.5;
}
.result-section .body ul {
  list-style: none;
  display: grid;
  gap: 6px;
}
.result-section .body li {
  padding-left: 14px;
  position: relative;
}
.result-section .body li::before {
  content: "";
  position: absolute;
  left: 2px; top: 9px;
  width: 4px; height: 4px;
  background: var(--text-3);
  border-radius: 50%;
}

.no-prophylaxis {
  background: var(--ok-bg);
  border-left: 3px solid #16a34a;
  color: var(--ok-fg);
}
.no-prophylaxis h3 { color: var(--ok-fg); }

/* Notas informativas neutras */
.note {
  background: var(--info-bg);
  border: 1px solid #dbeafe;
  border-radius: var(--radius);
  padding: 10px 12px;
  font-size: 13px;
  color: var(--info-fg);
  line-height: 1.4;
  margin-bottom: 10px;
}

/* ============================================================
   Tabs (navegación principal)
   ============================================================ */
.tabs {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 4px;
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 4px;
  margin-bottom: 16px;
}
.tab {
  min-height: var(--tap);
  padding: 8px 10px;
  border-radius: var(--radius-sm);
  font-size: 13px;
  font-weight: 600;
  color: var(--text-3);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  text-transform: uppercase;
  letter-spacing: .04em;
  transition: background .12s, color .12s;
}
.tab[aria-selected="true"] {
  background: var(--surface);
  color: var(--text);
  box-shadow: 0 1px 2px rgba(15,23,42,.06);
}

/* ============================================================
   Vista: GUÍA (tabla)
   ============================================================ */
.guide h2 {
  font-size: 18px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 4px;
  letter-spacing: -.01em;
}
.guide .sub {
  font-size: 13px;
  color: var(--text-3);
  margin-bottom: 14px;
}

/* Scroll horizontal en móvil para mantener legibilidad de la tabla */
.table-wrap {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  margin-bottom: 14px;
  /* Sombra sutil que indica scroll lateral */
  background-image:
    linear-gradient(to right, var(--surface), var(--surface)),
    linear-gradient(to right, var(--surface), var(--surface)),
    linear-gradient(to right, rgba(15,23,42,.08), rgba(255,255,255,0)),
    linear-gradient(to left,  rgba(15,23,42,.08), rgba(255,255,255,0));
  background-position: left center, right center, left center, right center;
  background-repeat: no-repeat;
  background-color: var(--surface);
  background-size: 20px 100%, 20px 100%, 14px 100%, 14px 100%;
  background-attachment: local, local, scroll, scroll;
}
.guide-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 12.5px;
  min-width: 720px; /* fuerza scroll en móvil para mantener celdas legibles */
}
.guide-table caption {
  caption-side: top;
  text-align: left;
  padding: 12px 14px 10px;
  font-size: 14px;
  font-weight: 600;
  color: var(--text);
  background: var(--surface-2);
  border-bottom: 1px solid var(--border);
}
.guide-table thead th {
  position: sticky;
  top: 0;
  background: var(--surface-2);
  text-align: left;
  font-size: 10.5px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .06em;
  color: var(--text-3);
  padding: 9px 12px;
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
}
.guide-table tbody td {
  padding: 10px 12px;
  vertical-align: top;
  border-bottom: 1px solid var(--border);
  color: var(--text);
  line-height: 1.4;
}
.guide-table tbody tr:last-child td { border-bottom: none; }
.guide-table tbody tr:nth-child(even) td { background: rgba(15, 23, 42, .015); }
@media (prefers-color-scheme: dark) {
  .guide-table tbody tr:nth-child(even) td { background: rgba(255, 255, 255, .025); }
}
.guide-table .col-scen { font-weight: 600; min-width: 150px; }
.guide-table .col-pauta,
.guide-table .col-allergy { min-width: 220px; }
.guide-table .none {
  color: var(--text-3);
  font-style: italic;
}
.guide-table .var {
  display: block;
  margin-top: 6px;
  padding-top: 6px;
  border-top: 1px dashed var(--border);
}
.guide-table .var-label {
  display: block;
  font-size: 10.5px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .05em;
  color: var(--text-3);
  margin-bottom: 2px;
}
.guide-table .opt {
  display: block;
}

.scroll-hint {
  display: block;
  font-size: 11px;
  color: var(--text-3);
  margin: -8px 4px 14px;
  font-style: italic;
}

/* ============================================================
   Vista: FUENTES (bibliografía)
   ============================================================ */
.biblio h2 {
  font-size: 18px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 4px;
  letter-spacing: -.01em;
}
.biblio .sub {
  font-size: 13px;
  color: var(--text-3);
  margin-bottom: 14px;
}
.biblio-section {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 16px;
  margin-bottom: 10px;
}
.biblio-section h3 {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .06em;
  color: var(--text-3);
  margin-bottom: 8px;
}
.biblio-section p {
  font-size: 13.5px;
  color: var(--text-2);
  line-height: 1.5;
}
.biblio-section ul {
  list-style: none;
  display: grid;
  gap: 6px;
}
.biblio-section li {
  font-size: 13px;
  color: var(--text-2);
  line-height: 1.45;
  padding-left: 12px;
  position: relative;
}
.biblio-section li::before {
  content: "";
  position: absolute;
  left: 2px;
  top: 8px;
  width: 4px;
  height: 4px;
  background: var(--text-3);
  border-radius: 50%;
}
.biblio-link {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  min-height: var(--tap);
  padding: 10px 12px;
  background: var(--info-bg);
  color: var(--info-fg);
  border: 1px solid #dbeafe;
  border-radius: var(--radius);
  font-size: 13px;
  font-weight: 500;
  text-decoration: none;
  word-break: break-word;
}
@media (prefers-color-scheme: dark) {
  .biblio-link { border-color: var(--border); }
}
.biblio-meta {
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px 14px;
  font-size: 12.5px;
  color: var(--text-2);
  line-height: 1.6;
}
.biblio-meta strong { color: var(--text); font-weight: 600; }

/* Bloques plegables crítico/ajuste: chevron animado */
.collapsible-block {
  border-radius: var(--radius);
  margin-bottom: 10px;
  overflow: hidden;
}
.collapsible-block summary {
  display: flex;
  align-items: center;
  gap: 8px;
  list-style: none;
  cursor: pointer;
  padding: 11px 14px;
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .05em;
  user-select: none;
  -webkit-user-select: none;
  min-height: var(--tap);
}
.collapsible-block summary::-webkit-details-marker { display: none; }
.collapsible-block summary::marker { display: none; }
.collapsible-block .chevron {
  margin-left: auto;
  flex: 0 0 16px;
  width: 16px; height: 16px;
  transition: transform .2s ease;
}
.collapsible-block[open] .chevron { transform: rotate(180deg); }
.collapsible-block .block-body {
  font-size: 14px;
  line-height: 1.45;
  padding: 0 14px 12px;
}
.collapsible-block .block-body ul { list-style: none; display: grid; gap: 5px; }
.collapsible-block .block-body li { padding-left: 12px; position: relative; }
.collapsible-block .block-body li::before {
  content: "";
  position: absolute; left: 0; top: 8px;
  width: 4px; height: 4px;
  border-radius: 50%;
}

/* Variante roja: contraindicaciones */
.collapsible-block.danger {
  background: var(--alert-bg);
  border: 1px solid var(--alert-bd);
  border-left: 3px solid #dc2626;
}
.collapsible-block.danger summary { color: var(--alert-fg); }
.collapsible-block.danger .block-body { color: var(--alert-fg); }
.collapsible-block.danger .block-body li::before { background: var(--alert-fg); }

/* Variante naranja: ajuste renal/hepático */
.collapsible-block.warn-organ {
  background: #fff7ed;
  border: 1px solid #fed7aa;
  border-left: 3px solid #ea580c;
}
.collapsible-block.warn-organ summary { color: #9a3412; }
.collapsible-block.warn-organ .block-body { color: #7c2d12; }
.collapsible-block.warn-organ .block-body li::before { background: #9a3412; }
@media (prefers-color-scheme: dark) {
  .collapsible-block.warn-organ {
    background: #431407;
    border-color: #9a3412;
    border-left-color: #ea580c;
  }
  .collapsible-block.warn-organ summary { color: #fdba74; }
  .collapsible-block.warn-organ .block-body { color: #fed7aa; }
  .collapsible-block.warn-organ .block-body li::before { background: #fdba74; }
}

/* Toggle factores de riesgo */
.fr-toggles {
  display: grid;
  gap: 6px;
  margin-bottom: 12px;
}
.fr-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 10px 12px;
}
.fr-card h4 {
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .05em;
  color: var(--text-3);
  margin-bottom: 6px;
}
.fr-card p { font-size: 13px; color: var(--text-2); line-height: 1.4; }

/* ============================================================
   Footer (bibliografía + disclaimer fijo)
   ============================================================ */
footer.app-footer {
  margin: 24px -16px 0;
  padding: 16px 16px calc(16px + env(safe-area-inset-bottom));
  background: var(--surface-2);
  border-top: 1px solid var(--border);
  font-size: 12px;
  color: var(--text-3);
  line-height: 1.5;
}
footer.app-footer h4 {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .07em;
  color: var(--text-2);
  margin-bottom: 6px;
}
footer.app-footer ul {
  list-style: none;
  display: grid;
  gap: 4px;
  margin-bottom: 12px;
}
footer.app-footer li {
  padding-left: 10px;
  position: relative;
}
footer.app-footer li::before {
  content: "·";
  position: absolute; left: 2px; top: 0;
  color: var(--text-3);
  font-weight: 700;
}
footer.app-footer .privacy {
  margin-top: 8px;
  font-size: 11px;
  color: var(--text-3);
}

/* ============================================================
   Animaciones mínimas
   ============================================================ */
@keyframes fade {
  from { opacity: 0; transform: translateY(4px); }
  to   { opacity: 1; transform: translateY(0); }
}
.animate { animation: fade .2s ease-out; }

@media (prefers-reduced-motion: reduce) {
  .animate { animation: none; }
}

/* Modo oscuro suave (respeta preferencia del SO) */
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #0f172a;
    --surface: #1e293b;
    --surface-2: #334155;
    --border: #334155;
    --border-strong: #475569;
    --text: #f1f5f9;
    --text-2: #cbd5e1;
    --text-3: #94a3b8;
    --primary: #60a5fa;
    --primary-fg: #0f172a;
    --info-bg: #1e3a5f;
    --info-fg: #bfdbfe;
    --warn-bg: #422c0a;
    --warn-fg: #fbbf24;
    --warn-bd: #78350f;
    --alert-bg: #450a0a;
    --alert-fg: #fca5a5;
    --alert-bd: #7f1d1d;
    --ok-bg: #14532d;
    --ok-fg: #86efac;
  }
}
</style>
</head>
<body>

<div class="app">

  <header class="app-header">
    <h1><span class="dot" aria-hidden="true"></span>PROFILAXIS ANTIBIÓTICA QUIRÚRGICA</h1>
    <span class="tag">Cirugía General y del Aparato Digestivo · v1.0</span>
  </header>

  <!-- Navegación por pestañas -->
  <div class="tabs" role="tablist" aria-label="Navegación principal">
    <button class="tab" role="tab" id="tab-consulta"
            aria-selected="true" aria-controls="main"
            data-tab="list" type="button">Consulta</button>
    <button class="tab" role="tab" id="tab-guia"
            aria-selected="false" aria-controls="main"
            data-tab="guide" type="button">Guía</button>
    <button class="tab" role="tab" id="tab-biblio"
            aria-selected="false" aria-controls="main"
            data-tab="biblio" type="button">Fuentes</button>
  </div>

  <!-- Disclaimer obligatorio (MDR) -->
  <div class="disclaimer" role="note" id="disclaimer-banner">
    <svg class="icn" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">

const state = {

const main = document.getElementById("main");

/* Vinculación de los tabs (Consulta / Guía / Fuentes) */
function bindTabs() {
  document.querySelectorAll(".tab[data-tab]").forEach(tab => {
    tab.addEventListener("click", () => {
      const target = tab.getAttribute("data-tab");
      if (target === "guide") {
        setView({ view: "guide", surgeryId: null, scenarioId: null });
      } else if (target === "biblio") {
        setView({ view: "biblio", surgeryId: null, scenarioId: null });
      } else {
        setView({ view: "list", surgeryId: null, scenarioId: null });
      }
    });
  });
}

function syncTabs() {
  // En la vista detalle, la pestaña activa sigue siendo "Consulta"
  const v = state.view;
  document.getElementById("tab-consulta").setAttribute("aria-selected",
    String(v === "list" || v === "detail"));
  document.getElementById("tab-guia").setAttribute("aria-selected", String(v === "guide"));
  document.getElementById("tab-biblio").setAttribute("aria-selected", String(v === "biblio"));
  // Ocultar el banner amarillo solo en la pestaña Fuentes
  document.getElementById("disclaimer-banner").style.display =
    v === "biblio" ? "none" : "";
}

function setView(next) {
  Object.assign(state, next);
  render();
  // Llevar el foco al inicio del main para lectores de pantalla
  main.focus?.();
  window.scrollTo({ top: 0, behavior: "instant" in window ? "instant" : "auto" });
}

/* ============================================================
   RENDER (vanilla, sin frameworks)
   Toda la información se construye localmente.
   No hay llamadas de red ni almacenamiento de datos del paciente.
   ============================================================ */

function render() {
  syncTabs();
  if (state.view === "guide")  return renderGuide();
  if (state.view === "biblio") return renderBiblio();
  if (state.view === "detail") return renderDetail();
  return renderList();
}

   Las variantes (SARM, BLEE, peso > 160 kg, alto/bajo riesgo) se muestran
   anidadas dentro de la celda "Pauta estándar" con su etiqueta.

function renderGuideRow(e) {
  if (e.prophylaxis === null) {
    return `
      <tr>
        <td class="col-scen">${escapeHtml(e.label)}</td>
        <td class="col-pauta none">Sin profilaxis antibiótica.</td>
        <td class="col-allergy none">Sin profilaxis antibiótica.</td>
      </tr>
    `;
  }
  const p = e.prophylaxis;
  const standard = p.standard.map(t => `<span class="opt">${escapeHtml(t)}</span>`).join("");
  const variants = (p.special || []).map(s => `
    <span class="var">
      <span class="var-label">${escapeHtml(s.titulo)}</span>
      ${s.contenido.map(t => `<span class="opt">${escapeHtml(t)}</span>`).join("")}
    </span>
  `).join("");
  const allergy = p.allergy.map(t => `<span class="opt">${escapeHtml(t)}</span>`).join("");

  return `
    <tr>
      <td class="col-scen">${escapeHtml(e.label)}</td>
      <td class="col-pauta">${standard}${variants}</td>
      <td class="col-allergy">${allergy}</td>
    </tr>
  `;
}

function renderList() {
  const q = state.query.trim().toLowerCase();
  const items = PROTOCOLO.filter(s =>
    !q || s.nombre.toLowerCase().includes(q)
  );

  main.innerHTML = `
    <div class="animate">
      <p class="view-title">Seleccione el tipo de cirugía</p>
      <input
        class="search"
        type="search"
        inputmode="search"
        autocomplete="off"
        placeholder="Buscar tipo de cirugía…"
        aria-label="Buscar tipo de cirugía"
        value="${escapeAttr(state.query)}"
      >
      <ul class="list" role="list">
        ${items.map(s => `
          <li>
            <button class="surgery-btn" data-surgery="${s.id}" type="button">
              <span>${escapeHtml(s.nombre)}</span>
              <span class="arrow" aria-hidden="true">›</span>
            </button>
          </li>
        `).join("") || `
          <li><div class="note">No se encontraron tipos de cirugía con ese término.</div></li>
        `}
      </ul>
    </div>
  `;

  // Listeners
  main.querySelector(".search").addEventListener("input", e => {
    state.query = e.target.value;
    // Re-render parcial: redibujamos solo la lista para no perder el foco del input
    const list = main.querySelector(".list");
    const newQ = state.query.trim().toLowerCase();
    const newItems = PROTOCOLO.filter(s => !newQ || s.nombre.toLowerCase().includes(newQ));
    list.innerHTML = newItems.map(s => `
      <li>
        <button class="surgery-btn" data-surgery="${s.id}" type="button">
          <span>${escapeHtml(s.nombre)}</span>
          <span class="arrow" aria-hidden="true">›</span>
        </button>
      </li>
    `).join("") || `<li><div class="note">No se encontraron tipos de cirugía con ese término.</div></li>`;
    bindSurgeryButtons();
  });
  bindSurgeryButtons();
}

function bindSurgeryButtons() {
  main.querySelectorAll("[data-surgery]").forEach(btn => {
    btn.addEventListener("click", () => {
      const id = btn.getAttribute("data-surgery");
      const surgery = PROTOCOLO.find(s => s.id === id);
      // Si solo hay un escenario, ir directo a él
      const initialScenario = surgery.escenarios.length === 1 ? surgery.escenarios[0].id : null;
      setView({ view: "detail", surgeryId: id, scenarioId: initialScenario });
    });
  });
}

function renderDetail() {
  const surgery = PROTOCOLO.find(s => s.id === state.surgeryId);
  if (!surgery) { setView({ view: "list" }); return; }
  const scenario = surgery.escenarios.find(e => e.id === state.scenarioId) || null;

  main.innerHTML = `
    <div class="animate detail">
      <button class="back" id="btn-back" type="button">
        <span class="arrow" aria-hidden="true">‹</span>
        <span>Volver</span>
      </button>
      <h2>${escapeHtml(surgery.nombre)}</h2>
      <p class="sub">Seleccione el escenario clínico aplicable.</p>

      <ul class="scenarios" role="list">
        ${surgery.escenarios.map(e => `
          <li>
            <button class="scenario-btn"
                    data-scenario="${e.id}"
                    aria-pressed="${state.scenarioId === e.id}"
                    type="button">
              <span class="label">${escapeHtml(e.label)}</span>
              <span class="pill">${escapeHtml(e.pill)}</span>
            </button>
          </li>
        `).join("")}
      </ul>

      <div id="scenario-output">
        ${scenario ? renderScenario(scenario) : ''}
      </div>

      ${renderRiskFactorsHelp()}
    </div>
  `;

  document.getElementById("btn-back").addEventListener("click", () => {
    setView({ view: "list", surgeryId: null, scenarioId: null });
  });

  main.querySelectorAll("[data-scenario]").forEach(btn => {
    btn.addEventListener("click", () => {
      const id = btn.getAttribute("data-scenario");
      state.scenarioId = id;
      // Re-render parcial sin perder posición
      main.querySelectorAll("[data-scenario]").forEach(b => {
        b.setAttribute("aria-pressed", b.getAttribute("data-scenario") === id);
      });
      const out = document.getElementById("scenario-output");
      const sc = surgery.escenarios.find(e => e.id === id);
      out.innerHTML = renderScenario(sc);
      // Scroll al resultado
      out.scrollIntoView({ behavior: "smooth", block: "start" });
    });
  });
}

function renderScenario(sc) {
  // Sin profilaxis
  if (sc.prophylaxis === null) {
    return `
      <div class="result animate" role="region" aria-label="Información del protocolo">
        <div class="result-section no-prophylaxis">
          <h3>Indicación según protocolo</h3>
          <div class="body"><strong>Sin profilaxis antibiótica.</strong></div>
        </div>
      </div>
      ${renderCriticalBlock()}
      ${renderAdjustBlock()}
      ${renderClinicalNote()}
    `;
  }

  const p = sc.prophylaxis;

  return `
    <div class="result animate" role="region" aria-label="Información del protocolo">
      <div class="result-section">
        <h3>Pauta estándar (según protocolo)</h3>
        <div class="body">
          <ul>${p.standard.map(t => `<li>${escapeHtml(t)}</li>`).join("")}</ul>
        </div>
      </div>

      ${p.special && p.special.length ? p.special.map(s => `
        <div class="result-section">
          <h3>${escapeHtml(s.titulo)}</h3>
          <div class="body">
            <ul>${s.contenido.map(t => `<li>${escapeHtml(t)}</li>`).join("")}</ul>
          </div>
        </div>
      `).join("") : ""}

      <div class="result-section">
        <h3>Pauta documentada en alérgicos a betalactámicos</h3>
        <div class="body">
          <ul>${p.allergy.map(t => `<li>${escapeHtml(t)}</li>`).join("")}</ul>
        </div>
      </div>
    </div>

    ${renderCriticalBlock()}
    ${renderAdjustBlock()}
    ${renderClinicalNote()}
  `;
}

/* Bloque CRÍTICO de contraindicaciones — plegable, siempre presente. */
function renderCriticalBlock() {
  return `
    <details class="collapsible-block danger" role="note">
      <summary aria-label="Contraindicaciones y verificación obligatoria">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="10"/>
          <line x1="12" y1="8" x2="12" y2="12"/>
          <line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        Contraindicaciones / verificación obligatoria
        <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <polyline points="6 9 12 15 18 9"/>
        </svg>
      </summary>
      <div class="block-body">
        El facultativo debe verificar antes de la administración:
        <ul>
          <li><strong>Alergias documentadas</strong> a betalactámicos u otros antimicrobianos.</li>
          <li><strong>Historia de reacción anafiláctica</strong> previa.</li>
          <li><strong>Vancomicina:</strong> riesgo de "síndrome del hombre rojo" (infusión &gt; 60 min); precaución en insuficiencia renal y ototoxicidad.</li>
          <li><strong>Aminoglucósidos (gentamicina):</strong> nefrotoxicidad y ototoxicidad; interacción con bloqueantes neuromusculares.</li>
          <li><strong>Clindamicina:</strong> riesgo de colitis por <em>C. difficile</em>.</li>
          <li><strong>Metronidazol:</strong> evitar consumo de alcohol; precaución en embarazo (1.<sup>er</sup> trimestre).</li>
          <li><strong>Imipenem:</strong> ajustar en insuficiencia renal; precaución en antecedentes de epilepsia.</li>
        </ul>
      </div>
    </details>
  `;
}

/* Bloque CRÍTICO de ajuste por función orgánica — plegable. */
function renderAdjustBlock() {
  return `
    <details class="collapsible-block warn-organ" role="note">
      <summary aria-label="Ajuste por función renal o hepática y momento de administración">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0Z"/>
          <line x1="12" y1="9" x2="12" y2="13"/>
          <line x1="12" y1="17" x2="12.01" y2="17"/>
        </svg>
        Ajuste renal / hepático · momento de administración
        <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <polyline points="6 9 12 15 18 9"/>
        </svg>
      </summary>
      <div class="block-body">
        <ul>
          <li><strong>Momento:</strong> administración 30–60 min antes de la incisión (60–120 min para vancomicina y fluoroquinolonas).</li>
          <li><strong>Redosificación intraoperatoria:</strong> valorar tras pérdida hemática &gt; 1.500 mL o cuando la duración exceda 2 vidas medias del fármaco.</li>
          <li><strong>Dosificación por peso:</strong> cefazolina 2 g (3 g si peso &gt; 120 kg / &gt; 160 kg según protocolo); vancomicina y aminoglucósidos por kg de peso real (valorar peso ajustado en obesidad).</li>
          <li><strong>Insuficiencia renal:</strong> ajustar vancomicina, aminoglucósidos e imipenem según aclaramiento de creatinina.</li>
          <li><strong>Insuficiencia hepática:</strong> precaución con metronidazol y clindamicina.</li>
        </ul>
      </div>
    </details>
  `;
}

function renderClinicalNote() {
  return `
    <div class="note" role="note">
      Esta consulta muestra la información del protocolo. La indicación final, la dosis adaptada al paciente
      y el resto de decisiones terapéuticas corresponden al facultativo responsable.
    </div>
  `;
}

function renderRiskFactorsHelp() {
  return `
    <details class="collapsible-block" style="background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--border-strong);" >
      <summary style="color:var(--text-2);">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
        </svg>
        Factores de riesgo (FR) — referencia
        <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <polyline points="6 9 12 15 18 9"/>
        </svg>
      </summary>
      <div class="block-body" style="color:var(--text-2); display:grid; gap:10px;">
        <div>
          <div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--text-3);margin-bottom:4px;">Dependientes del paciente</div>
          <ul>${FACTORES_RIESGO.paciente.map(f => `<li>${escapeHtml(f)}</li>`).join("")}</ul>
        </div>
        <div>
          <div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--text-3);margin-bottom:4px;">Dependientes de la intervención</div>
          <ul>${FACTORES_RIESGO.intervencion.map(f => `<li>${escapeHtml(f)}</li>`).join("")}</ul>
        </div>
      </div>
    </details>
  `;
}

/* ============================================================
   Utilidades de escape (defensa contra XSS al inyectar HTML)
   ============================================================ */
function escapeHtml(s) {
  return String(s ?? "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#39;");
}
function escapeAttr(s) { return escapeHtml(s); }

/* ============================================================
   Bootstrap
   ============================================================ */
bindTabs();
render();
