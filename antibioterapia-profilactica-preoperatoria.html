    <script>

            theme: {

        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .animate-view { animation: fadeIn 0.3s ease-out forwards; }
        
        /* Botones mínimos de 44px para interacción segura en pantallas táctiles */
        .btn-clinical { min-height: 44px; display: inline-flex; align-items: center; justify-content: center; }
        
        /* Ocultar barra de desplazamiento para limpieza visual pero permitir scroll */

        function App() {

          const handleSelectSurgery = (surgery) => {

            setSelectedScenario(null);

          };

          const resetAlgorithm = () => {
            setSelectedSurgery(null);
            setSelectedScenario(null);
          };

                          <span>{item}</span>

                    <span className="font-semibold text-clinical-900 flex items-center gap-2 mb-3 border-b border-clinical-200 pb-2">
                      <iconify-icon icon="lucide:activity" class="text-base"></iconify-icon> Dependientes de la intervención
                    </span>
                    <ul className="space-y-2">
                      {['Drenaje biliar', 'Colangiografía intraoperatoria', 'Tiempo quirúrgico > 2 horas', 'Perforación de vesícula biliar', 'Conversión a cirugía abierta', 'Colocación de material protésico'].map((item, i) => (

              <header className="sticky top-0 z-50 bg-white border-b border-clinical-200 shadow-sm">

                                <iconify-icon icon={selectedSurgery.icon} class="text-lg text-clinical-700"></iconify-icon> {selectedSurgery.category}
                              </div>
                              <h2 className="text-lg md:text-xl font-bold text-clinical-900">{selectedScenario.name}</h2>
                            </div>

                            <div className="p-5 md:p-6">

                                  <iconify-icon icon="lucide:shield-alert" class={`text-xl ${isAllergic ? 'text-alert-600' : 'text-clinical-400'}`}></iconify-icon>

                                    <span className="font-semibold block text-clinical-900 text-sm">Alergia a betalactámicos documentada</span>

                                      {isAllergic ? 'Se muestra pauta alternativa' : 'Desactivado (Pauta estándar)'}
                                    </span>
                                  </div>
                                </div>
                                <label className="relative inline-flex items-center cursor-pointer">
                                  <input type="checkbox" className="sr-only peer" checked={isAllergic} onChange={() => setIsAllergic(!isAllergic)} />
                                  <div className="w-12 h-6 bg-clinical-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-6 peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-alert-600"></div>
                                </label>
                              </div>

                              {/* Bloque de Información según la Guía */}
                              <div className="mb-6">
                                <h3 className="text-xs font-bold uppercase tracking-wider text-clinical-500 mb-2">Pauta según Guía</h3>
                                <div className={`p-4 rounded-lg border bg-clinical-50 border-clinical-200`}>
                                  <div className="text-lg md:text-xl font-bold text-clinical-900 whitespace-pre-line">
                                    {(isAllergic ? selectedScenario.alg : selectedScenario.std) === 'Sin profilaxis' ? (
                                      <span className="flex items-center gap-2 text-clinical-600">
                                        No indicada
                                      </span>
                                    ) : (
                                      <span>
                                        {isAllergic ? selectedScenario.alg : selectedScenario.std}
                                      </span>
                                    )}
                                  </div>
                                </div>
                              </div>

                              {/* Bloques Críticos Estáticos y Condicionales */}
                              {((isAllergic ? selectedScenario.alg : selectedScenario.std) !== 'Sin profilaxis') && (
                                <div className="space-y-3">
                                  <div className="bg-alert-50 border border-alert-100 p-3 rounded-lg flex items-start gap-3">
                                    <iconify-icon icon="lucide:alert-circle" class="text-alert-600 text-lg shrink-0 mt-0.5"></iconify-icon>
                                    <p className="text-xs text-alert-700 leading-relaxed font-medium">
                                      <strong>Ajuste renal/hepático:</strong> Verifique el filtrado glomerular y la función hepática del paciente. Ajuste la dosis según ficha técnica si procede.
                                    </p>
                                  </div>
                                  <div className="bg-clinical-50 border border-clinical-200 p-3 rounded-lg flex items-start gap-3">
                                    <iconify-icon icon="lucide:info" class="text-clinical-500 text-lg shrink-0 mt-0.5"></iconify-icon>
                                    <p className="text-xs text-clinical-700 leading-relaxed">
                                      <strong>Contraindicaciones:</strong> Revisar historia clínica para contraindicaciones específicas a los principios activos listados antes de su administración.
                                    </p>
                                  </div>
                                </div>
                              )}

                            </div>
                          </div>
                        </div>
                      )}
                    </div>
                  )}

                  {activeTab === 'guide' && (
                    <div className="space-y-6">
                      <div className="mb-6">
                        <h2 className="text-xl font-bold text-clinical-900 mb-1">Guía Clínica Completa</h2>
                        <p className="text-sm text-clinical-600">Tablas resumen de indicaciones y pautas.</p>
                      </div>

                      <RiskFactorsCard />

                      <div className="space-y-6">
                        {data.map((surgery) => (
                          <div key={surgery.id} className="bg-white rounded-xl border border-clinical-200 shadow-sm overflow-hidden">
                            <div className="px-4 py-3 border-b border-clinical-200 bg-clinical-50 flex items-center gap-3">
                              <iconify-icon icon={surgery.icon} class="text-xl text-clinical-700"></iconify-icon>
                              <h3 className="font-bold text-clinical-900 text-sm md:text-base">{surgery.category}</h3>
                            </div>
                            <div className="overflow-x-auto">
                              <table className="w-full text-left border-collapse text-sm">
                                <thead>
                                  <tr className="bg-white text-clinical-500 text-xs uppercase tracking-wide border-b border-clinical-200">
                                    <th className="p-3 font-semibold w-1/3">Escenario clínico</th>
                                    <th className="p-3 font-semibold w-1/3">Pauta estándar</th>
                                    <th className="p-3 font-semibold w-1/3">Alérgicos Betalactámicos</th>
                                  </tr>
                                </thead>
                                <tbody className="text-clinical-800 divide-y divide-clinical-100">
                                  {surgery.scenarios.map((scen) => (
                                    <tr key={scen.id} className="hover:bg-clinical-50">
                                      <td className="p-3 font-medium align-top">{scen.name}</td>
                                      <td className="p-3 whitespace-pre-line align-top">
                                        {scen.std === 'Sin profilaxis' ? <span className="text-clinical-500">No indicada</span> : scen.std}
                                      </td>
                                      <td className="p-3 whitespace-pre-line align-top">
                                        {scen.alg === 'Sin profilaxis' ? <span className="text-clinical-500">No indicada</span> : scen.alg}
                                      </td>
                                    </tr>
                                  ))}
                                </tbody>
                              </table>
                            </div>
                          </div>
                        ))}
                      </div>
                    </div>
                  )}
                </div>
              </main>

              {/* Trazabilidad y Descargo de Responsabilidad (MDR Compliance) */}
              <footer className="mt-auto bg-white border-t border-clinical-200 pb-8 pt-6">
                <div className="max-w-4xl mx-auto px-4 space-y-5">
                  
                  <div className="bg-clinical-50 rounded-lg p-4 text-xs text-clinical-700 space-y-2 border border-clinical-100">
                    <p className="font-semibold text-clinical-900 text-sm">Aviso Legal y Descargo de Responsabilidad (MDR)</p>
                    <p>Herramienta informativa de apoyo clínico. No constituye un producto sanitario de diagnóstico o decisión automática (no clasificado como alto riesgo bajo el Reglamento UE 2017/745 MDR). <strong>No sustituye el juicio clínico del profesional.</strong></p>
                    <p>La prescripción final, evaluación de interacciones, contraindicaciones y ajustes de dosis son responsabilidad exclusiva del facultativo. Verifique siempre la información con las fichas técnicas oficiales de la AEMPS y fuentes primarias.</p>
                    <p>Privacidad: Todo el cálculo y visualización se ejecuta localmente en el navegador. No se recogen ni envían datos de salud (cumplimiento GDPR).</p>
                  </div>

                  <div className="text-xs text-clinical-600 space-y-2">
                    <p className="font-semibold text-clinical-900 text-sm">Bibliografía y Origen de los Datos</p>
                    <p className="text-clinical-800"><strong>Protocolo de uso estrictamente interno:</strong> Este documento es un protocolo de elaboración propia concebido exclusivamente para el uso interno del servicio.</p>
                    <ul className="space-y-1 list-none pl-0">
                      <li><strong>Servicio:</strong> Cirugía General y del Aparato Digestivo (SCGAD). Sección CEG.</li>
                      <li><strong>Centro:</strong> Consorcio Hospital General Universitario de Valencia (CHGUV).</li>
                      <li><strong>Autores:</strong> Javier Tarrasa, Celia Báez, Alejandra De Andrés. Versión: 1.0.</li>
                    </ul>
                    <div className="pt-2">
                      <a 
                        href="https://docs.google.com/presentation/d/1YiBr53dk4QAevJICjE4MCIXP4HXFVq4v/edit?usp=share_link&ouid=112668181151097650207&rtpof=true&sd=true" 
                        target="_blank" 
                        rel="noopener noreferrer" 
                        className="inline-flex items-center gap-1.5 text-action-700 hover:text-action-800 bg-action-50 hover:bg-action-100 px-3 py-2 rounded-md transition-colors font-medium border border-action-200"
                      >
                        <iconify-icon icon="lucide:external-link" class="text-sm"></iconify-icon>
                        Ver documento original del protocolo
                      </a>
                    </div>
                  </div>

                </div>
              </footer>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
